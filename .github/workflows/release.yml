name: Release TRMNL Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_DIR: simple-ical-calendar

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        shell: bash
        run: echo "tag=v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        shell: bash
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## Changes"
            echo
            git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))"
          } > RELEASE_NOTES.md

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p "$RELEASE_DIR"
          cp -R src/* "$RELEASE_DIR"/
          [ -f settings.yml ] && cp settings.yml "$RELEASE_DIR"/
          [ -f full.blade.php ] && cp full.blade.php "$RELEASE_DIR"/
          [ -f README.md ] && cp README.md "$RELEASE_DIR"/

      - name: Create zip archive
        shell: bash
        run: |
          cd "$RELEASE_DIR"
          zip -r "../simple-ical-calendar-${{ steps.tag.outputs.tag }}.zip" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Simple iCAL Calendar ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: simple-ical-calendar-${{ steps.tag.outputs.tag }}.zip
